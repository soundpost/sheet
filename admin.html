<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사운드포스트 - 악보 관리자</title>
    <style>
        :root { --wood: #3d2b1f; --gold: #d4af37; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .config-sec { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .song-edit-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px; position: relative; }
        .part-row { display: flex; gap: 10px; margin-top: 5px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; background: var(--wood); color: white; }
        .btn-add { background: #28a745; }
        .btn-del { background: #dc3545; }
        .btn-save { background: var(--gold); width: 100%; font-size: 1.1rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>🎻 Soundpost 악보 관리 시스템</h2>
    
    <div class="config-sec">
        <input type="password" id="ghToken" placeholder="GitHub Personal Access Token" style="width: 300px;">
        <input type="text" id="ghRepo" placeholder="아이디/저장소명 (예: gildong/soundpost-scores)">
        <button onclick="loadCurrentData()">데이터 불러오기</button>
    </div>

    <div id="editor">
        </div>

    <button class="btn-add" onclick="addSong()">+ 새 곡 추가</button>
    <hr>
    <button class="btn-save" onclick="saveToGithub()">GitHub에 저장 및 업데이트</button>
</div>

<script>
    let currentData = [];
    let fileSha = ""; // 깃허브 API 업데이트에 필수인 파일 식별값

    // 1. 데이터 불러오기
    async function loadCurrentData() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        
        const response = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
            headers: { 'Authorization': `token ${token}` }
        });
        const data = await response.json();
        fileSha = data.sha;
        currentData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
        renderEditor();
    }

    // 2. 편집 화면 그리기
    function renderEditor() {
        const editor = document.getElementById('editor');
        editor.innerHTML = '';
        currentData.forEach((song, sIdx) => {
            const card = document.createElement('div');
            card.className = 'song-edit-card';
            card.innerHTML = `
                <button class="btn-del" style="position:absolute; right:10px;" onclick="removeSong(${sIdx})">곡 삭제</button>
                <h4>곡 정보</h4>
                <input type="text" value="${song.title}" onchange="updateSong(${sIdx}, 'title', this.value)" placeholder="곡 제목" style="width:80%"><br><br>
                <input type="text" value="${song.subtitle}" onchange="updateSong(${sIdx}, 'subtitle', this.value)" placeholder="영문 제목/작곡가" style="width:80%">
                <h5>파트보 목록</h5>
                <div id="parts-${sIdx}">
                    ${song.parts.map((p, pIdx) => `
                        <div class="part-row">
                            <input type="text" value="${p.code}" onchange="updatePart(${sIdx}, ${pIdx}, 'code', this.value)" placeholder="Vn 1" size="5">
                            <input type="text" value="${p.name}" onchange="updatePart(${sIdx}, ${pIdx}, 'name', this.value)" placeholder="파트 이름">
                            <input type="text" value="${p.file}" onchange="updatePart(${sIdx}, ${pIdx}, 'file', this.value)" placeholder="파일 경로" style="flex-grow:1">
                            <button onclick="removePart(${sIdx}, ${pIdx})">x</button>
                        </div>
                    `).join('')}
                </div>
                <button class="btn-add" onclick="addPart(${sIdx})" style="margin-top:10px;">+ 파트 추가</button>
            `;
            editor.appendChild(card);
        });
    }

    // 데이터 조작 함수들 (updateSong, addSong, updatePart 등)
    function updateSong(sIdx, key, val) { currentData[sIdx][key] = val; }
    function addSong() { currentData.push({title:"", subtitle:"", parts:[]}); renderEditor(); }
    function removeSong(sIdx) { currentData.splice(sIdx, 1); renderEditor(); }
    function addPart(sIdx) { currentData[sIdx].parts.push({code:"", name:"", file:""}); renderEditor(); }
    function updatePart(sIdx, pIdx, key, val) { currentData[sIdx].parts[pIdx][key] = val; }
    function removePart(sIdx, pIdx) { currentData[sIdx].parts.splice(pIdx, 1); renderEditor(); }

    // 3. 깃허브로 전송 (Commit)
    async function saveToGithub() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
        
        const response = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "Update scores via Admin Web",
                content: content,
                sha: fileSha
            })
        });

        if(response.ok) alert("성공적으로 업데이트되었습니다! 1~2분 후 페이지에 반영됩니다.");
        else alert("업데이트 실패. 토큰이나 경로를 확인하세요.");
    }
</script>
</body>
</html>
